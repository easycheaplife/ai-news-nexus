<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Handling Proposal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0c; color: white; font-family: sans-serif; }
        .band { background: #131316; border: 1px solid rgba(255,255,255,0.05); border-radius: 1rem; transition: all 0.3s; cursor: pointer; }
        .band:hover { border-color: #2563eb; background: #18181c; }
        .modal { background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="p-10">
    <div class="max-w-5xl mx-auto space-y-12">
        <header>
            <h1 class="text-3xl font-black italic mb-2 tracking-tighter">MEDIA <span class="text-blue-600">HANDLING</span></h1>
            <p class="text-slate-500">横条布局下的多媒体交互提案</p>
        </header>

        <!-- Preview Band -->
        <div class="space-y-4">
            <h3 class="text-xs font-black uppercase text-slate-500 tracking-widest">1. 列表预览态 (List View)</h3>
            <div class="band p-3 flex items-center gap-6">
                <!-- Media Area with indicators -->
                <div class="relative w-64 aspect-video rounded-lg overflow-hidden shrink-0 group">
                    <div class="absolute inset-0 bg-blue-600/20 flex items-center justify-center text-[10px] font-bold">VIDEO / IMG PREVIEW</div>
                    <!-- Indicator for multi-images -->
                    <div class="absolute bottom-2 right-2 bg-black/60 px-1.5 py-0.5 rounded text-[8px] font-bold border border-white/10">+3 Photos</div>
                    <div class="absolute inset-0 bg-blue-600/0 group-hover:bg-blue-600/20 transition-all flex items-center justify-center opacity-0 group-hover:opacity-100">
                        <span class="bg-white text-black px-2 py-1 rounded-md text-[10px] font-black uppercase tracking-tighter">Click to Expand</span>
                    </div>
                </div>
                <div class="flex-1">
                    <div class="h-4 bg-white/10 rounded w-1/2 mb-2"></div>
                    <div class="h-3 bg-white/5 rounded w-full"></div>
                </div>
            </div>
        </div>

        <!-- Modal Simulation -->
        <div class="space-y-4">
            <h3 class="text-xs font-black uppercase text-slate-500 tracking-widest">2. 沉浸式灯箱态 (Lightbox View)</h3>
            <div class="relative h-[500px] w-full modal rounded-[2rem] border border-white/10 overflow-hidden flex flex-col items-center justify-center">
                 <div class="absolute top-6 right-8 text-slate-400 hover:text-white cursor-pointer font-bold">CLOSE [ESC]</div>
                 
                 <!-- Main High-Res Content -->
                 <div class="w-3/4 aspect-video bg-white/5 rounded-2xl flex items-center justify-center border border-white/5 shadow-2xl relative">
                    <div class="text-xs opacity-30 font-mono italic">HIGH-RES 4K VIDEO PLAYER / IMAGE GALLERY</div>
                    
                    <!-- Navigation -->
                    <div class="absolute inset-y-0 -left-16 flex items-center text-3xl opacity-30 hover:opacity-100 cursor-pointer">‹</div>
                    <div class="absolute inset-y-0 -right-16 flex items-center text-3xl opacity-30 hover:opacity-100 cursor-pointer">›</div>
                 </div>

                 <!-- Meta Info in Modal -->
                 <div class="mt-10 text-center max-w-xl">
                    <h2 class="text-xl font-bold mb-2">OpenAI Sora: Full Cinematic Trailer</h2>
                    <p class="text-sm text-slate-400">来自 @OpenAI 的原始 4K 素材，展示了物理引擎的深度升级...</p>
                 </div>
            </div>
        </div>
    </div>
</body>
</html>
