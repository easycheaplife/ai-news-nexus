<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Nexus 宽屏资讯流提案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050507; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .accent-border { border-left: 4px solid #2563eb; }
        .card-preview { background: #131316; border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; transition: all 0.3s; }
    </style>
</head>
<body class="p-8 md:p-16">
    <div class="max-w-[1400px] mx-auto">
        <header class="mb-16 border-b border-white/5 pb-10">
            <h1 class="text-5xl font-black tracking-tighter mb-4 italic">WIDE <span class="text-blue-600 not-italic">INTEL</span></h1>
            <p class="text-slate-500 text-lg">既然简报已拉宽，资讯流如何进化？</p>
        </header>

        <div class="space-y-32">
            <!-- 方案 A: 沉浸式大画幅单列 -->
            <section>
                <div class="flex items-center gap-4 mb-8">
                    <span class="bg-blue-600 text-white px-4 py-1 rounded-full text-xs font-black uppercase">OPTION A</span>
                    <h2 class="text-3xl font-bold">沉浸式宽屏单列 (Immersive Wide)</h2>
                </div>
                <div class="max-w-[1100px] mx-auto space-y-8">
                    <div class="card-preview p-8 flex flex-col lg:flex-row gap-10">
                        <div class="lg:w-[600px] h-[340px] bg-blue-600/10 rounded-2xl border border-white/5 flex items-center justify-center text-xs opacity-50">ULTRA-WIDE MEDIA (600px)</div>
                        <div class="flex-1 space-y-6">
                            <div class="h-8 bg-white/10 rounded-lg w-full"></div>
                            <div class="h-4 bg-white/5 rounded-lg w-3/4"></div>
                            <div class="h-24 bg-primary/5 rounded-2xl border border-primary/10"></div>
                            <div class="flex justify-between items-center mt-10">
                                <div class="w-20 h-4 bg-white/5 rounded"></div>
                                <div class="w-16 h-4 bg-blue-600/20 rounded"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <p class="mt-6 text-slate-400 text-sm italic text-center">优点：大图/大视频非常有冲击力，适合“逛”的感觉，阅读专注度最高。</p>
            </section>

            <!-- 方案 B: 错落式双列杂志流 -->
            <section>
                <div class="flex items-center gap-4 mb-8">
                    <span class="bg-orange-600 text-white px-4 py-1 rounded-full text-xs font-black uppercase">OPTION B</span>
                    <h2 class="text-3xl font-bold">错落式双列流 (Asymmetric Masonry)</h2>
                </div>
                <div class="grid grid-cols-3 gap-8">
                    <!-- Featured -->
                    <div class="col-span-2 card-preview p-6 h-[500px] relative overflow-hidden">
                        <div class="absolute inset-0 bg-orange-600/5 blur-3xl -z-10"></div>
                        <div class="h-64 bg-white/5 rounded-xl mb-6"></div>
                        <div class="h-8 bg-white/10 rounded-lg mb-4"></div>
                        <div class="h-20 bg-white/5 rounded-lg"></div>
                        <span class="absolute top-4 left-4 bg-orange-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">95+ Score</span>
                    </div>
                    <!-- Regular -->
                    <div class="col-span-1 space-y-8">
                        <div class="card-preview p-6 h-[240px]">
                            <div class="h-4 bg-white/10 rounded-lg mb-3"></div>
                            <div class="h-16 bg-white/5 rounded-lg mb-4"></div>
                            <div class="h-24 bg-white/5 rounded-xl"></div>
                        </div>
                        <div class="card-preview p-6 h-[220px]">
                             <div class="h-4 bg-white/10 rounded-lg mb-3"></div>
                             <div class="h-16 bg-white/5 rounded-lg"></div>
                        </div>
                    </div>
                </div>
                <p class="mt-8 text-slate-400 text-sm italic text-center">优点：利用率最高，主次极度分明。左侧大卡片抓重点，右侧小卡片补细节。</p>
            </section>

            <!-- 方案 C: 情报横条模式 -->
            <section>
                <div class="flex items-center gap-4 mb-8">
                    <span class="bg-green-600 text-white px-4 py-1 rounded-full text-xs font-black uppercase">OPTION C</span>
                    <h2 class="text-3xl font-bold">全屏情报横条 (Strategic Bands)</h2>
                </div>
                <div class="space-y-4">
                    <div class="card-preview p-4 flex items-center gap-8 border-l-4 border-green-600">
                        <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center font-bold">X</div>
                        <div class="w-[280px] h-20 bg-white/5 rounded-xl shrink-0"></div>
                        <div class="flex-1">
                            <div class="h-5 bg-white/10 rounded w-2/3 mb-2"></div>
                            <div class="h-3 bg-white/5 rounded w-full"></div>
                        </div>
                        <div class="w-20 text-center font-black text-green-500">92</div>
                    </div>
                    <div class="card-preview p-4 flex items-center gap-8 border-l-4 border-white/10">
                        <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center font-bold">G</div>
                        <div class="w-[280px] h-20 bg-white/5 rounded-xl shrink-0"></div>
                        <div class="flex-1">
                            <div class="h-5 bg-white/10 rounded w-1/2 mb-2"></div>
                            <div class="h-3 bg-white/5 rounded w-3/4"></div>
                        </div>
                        <div class="w-20 text-center font-black text-slate-500">78</div>
                    </div>
                </div>
                <p class="mt-6 text-slate-400 text-sm italic text-center">优点：扫描速度最快，一眼看完 10 条，适合专业的信息流快速过筛。</p>
            </section>
        </div>
    </div>
</body>
</html>
